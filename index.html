<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MINI GOLF</title>
<style>
  :root { --fg:#e8e8e8; --fairway:#2f7d4f; --rough:#25623e; --wall:#173a26; --ball:#f5f5f5; --cup:#0d1f14; --accent:#facc15; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    background:#0a0f0c; color:var(--fg);
    font:14px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; min-height:100vh; overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  #hud { display:flex; gap:20px; letter-spacing:1px; text-transform:uppercase; font-size:12px; opacity:.92; flex-wrap:wrap; justify-content:center; }
  #hud b { color:var(--accent); font-variant-numeric:tabular-nums; }
  #hud .who { color:var(--fg); text-transform:none; opacity:.7; }
  canvas { background:var(--rough); border:1px solid var(--wall); border-radius:6px; touch-action:none; cursor:crosshair; max-width:100%; }
  #hint { font-size:11px; opacity:.45; letter-spacing:1px; height:14px; }

  /* live social toasts */
  #toasts { position:fixed; top:14px; right:14px; display:flex; flex-direction:column; gap:8px; z-index:20; align-items:flex-end; pointer-events:none; }
  .toast {
    background:#0e1712; border:1px solid var(--accent); color:var(--fg);
    padding:9px 13px; border-radius:8px; font-size:13px; letter-spacing:.4px;
    box-shadow:0 4px 14px rgba(0,0,0,.45); max-width:280px;
    opacity:0; transform:translateX(14px); transition:opacity .3s ease, transform .3s ease;
  }
  .toast.show { opacity:1; transform:none; }
  .toast b { color:var(--accent); }

  /* overlays */
  .overlay {
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(6,10,8,.86); z-index:10; padding:20px;
  }
  .overlay.show { display:flex; }
  .card {
    background:#0e1712; border:1px solid var(--wall); border-radius:10px; padding:28px 30px;
    width:min(440px,100%); text-align:center;
  }
  .card h1 { color:var(--accent); font-size:26px; letter-spacing:2px; margin-bottom:6px; }
  .card .sub { font-size:12px; opacity:.55; letter-spacing:1px; margin-bottom:20px; }
  .card input {
    width:100%; padding:11px 13px; font:inherit; color:var(--fg);
    background:#0a0f0c; border:1px solid var(--wall); border-radius:6px; text-align:center; margin-bottom:14px;
  }
  .card input:focus { outline:1px solid var(--accent); }
  .card button {
    width:100%; padding:11px; font:inherit; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    color:#0a0f0c; background:var(--accent); border:0; border-radius:6px; cursor:pointer;
  }
  .card button:hover { filter:brightness(1.08); }
  .result { font-size:15px; margin:6px 0 4px; }
  .result b { color:var(--accent); }
  .boards { display:flex; gap:16px; margin:18px 0 20px; text-align:left; }
  .board { flex:1; min-width:0; }
  .board h2 { font-size:11px; letter-spacing:1px; text-transform:uppercase; opacity:.6; margin-bottom:8px; border-bottom:1px solid var(--wall); padding-bottom:5px; }
  .board ol { list-style:none; font-size:13px; }
  .board li { display:flex; justify-content:space-between; gap:8px; padding:3px 0; font-variant-numeric:tabular-nums; }
  .board li .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .board li .sc { color:var(--accent); }
  .board li.me { color:var(--accent); font-weight:600; }
  .board .empty { opacity:.4; font-size:12px; }
</style>

<div id="hud">
  <span class="who">⛳ <b id="who">—</b></span>
  <span>Hole <b id="hole">1</b>/3</span>
  <span>Par <b id="par">3</b></span>
  <span>Strokes <b id="strokes">0</b></span>
  <span>Total <b id="total">0</b></span>
</div>
<canvas id="c" width="720" height="480"></canvas>
<div id="hint">drag back from the ball to aim &amp; set power — release to putt</div>
<div id="toasts"></div>

<!-- name entry -->
<div id="start" class="overlay show">
  <div class="card">
    <h1>MINI GOLF</h1>
    <div class="sub">3 holes · par 9 · fewest strokes wins</div>
    <input id="name" maxlength="20" placeholder="enter your name" autocomplete="off">
    <button id="startBtn">Start Round</button>
  </div>
</div>

<!-- round complete + leaderboards -->
<div id="end" class="overlay">
  <div class="card">
    <h1>ROUND COMPLETE</h1>
    <div class="result" id="endResult">—</div>
    <div class="result" id="endBest" style="font-size:13px;opacity:.7"></div>
    <div class="boards">
      <div class="board"><h2>Today</h2><ol id="boardToday"></ol></div>
      <div class="board"><h2>All time</h2><ol id="boardAll"></ol></div>
    </div>
    <button id="againBtn">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);
const W = canvas.width, H = canvas.height;

// ---- course data ----  walls are [x,y,w,h] rects (inset border added automatically)
const HOLES = [
  { par: 2, tee: [110, 240], cup: [610, 240], walls: [] },                       // straight
  { par: 3, tee: [110, 380], cup: [610, 110],                                     // dogleg
    walls: [[240, 0, 40, 340], [440, 140, 40, 340]] },
  { par: 4, tee: [110, 240], cup: [610, 240],                                     // center block + posts
    walls: [[330, 170, 60, 140], [200, 60, 40, 60], [480, 360, 40, 60]] },
];
const PAR = HOLES.reduce((a, h) => a + h.par, 0);

const R = 9;            // ball radius
const CUP_R = 15;       // cup radius
const MARGIN = 18;      // playfield inset (outer wall)
const MAX_DRAG = 150;   // px drag = max power
const MAX_SPEED = 13;   // px per step at full power
const FRICTION = 0.985; // per step velocity decay
const STOP = 0.06;      // speed below which the ball halts

let holeIdx = 0, strokes = 0, total = 0;
let ball, walls, cup;
let started = false, done = false;   // started: name entered; done: round over
let aim = null;                      // { x, y } current pointer while dragging
let playerName = '';

function loadHole(i) {
  const h = HOLES[i];
  ball = { x: h.tee[0], y: h.tee[1], vx: 0, vy: 0, moving: false };
  cup = { x: h.cup[0], y: h.cup[1] };
  walls = [
    [0, 0, W, MARGIN], [0, H - MARGIN, W, MARGIN],
    [0, 0, MARGIN, H], [W - MARGIN, 0, MARGIN, H],
    ...h.walls,
  ];
  strokes = 0; aim = null;
  $('hole').textContent = i + 1;
  $('par').textContent = h.par;
  $('strokes').textContent = 0;
  $('total').textContent = total;
}

// ---- name entry / round lifecycle ----
function beginRound(name) {
  playerName = name;
  $('who').textContent = name;
  localStorage.setItem('golf_name', name);
  holeIdx = 0; total = 0; done = false; started = true;
  $('start').classList.remove('show');
  $('end').classList.remove('show');
  loadHole(0);
}

$('startBtn').addEventListener('click', () => {
  const n = $('name').value.trim() || 'Player';
  beginRound(n);
});
$('name').addEventListener('keydown', e => { if (e.key === 'Enter') $('startBtn').click(); });
$('againBtn').addEventListener('click', () => beginRound(playerName));
$('name').value = localStorage.getItem('golf_name') || '';

async function finishRound() {
  done = true;
  const diff = total - PAR;
  const label = diff === 0 ? 'even par' : diff > 0 ? `+${diff}` : `${diff}`;
  $('endResult').innerHTML = `<b>${total}</b> strokes &middot; par ${PAR} &middot; ${label}`;
  $('endBest').textContent = '';
  renderBoard('boardToday', [], playerName);
  renderBoard('boardAll', [], playerName);
  $('end').classList.add('show');

  // submit + pull leaderboards (server returns them in the POST response)
  let data = null;
  try {
    const res = await fetch('/api/score', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: playerName, strokes: total }),
    });
    if (res.ok) data = await res.json();
  } catch (e) { console.warn('score submit failed', e); }

  if (data) {
    renderBoard('boardToday', data.today, playerName);
    renderBoard('boardAll', data.allTime, playerName);
    const mine = (data.allTime || []).find(s => s.name === playerName);
    if (mine) $('endBest').textContent = `your best for the round: ${mine.strokes}`;
  } else {
    $('boardToday').innerHTML = '<div class="empty">leaderboard unavailable offline</div>';
    $('boardAll').innerHTML = '';
  }
}

function renderBoard(id, rows, me) {
  const ol = $(id);
  if (!rows || !rows.length) { ol.innerHTML = '<div class="empty">no scores yet</div>'; return; }
  ol.innerHTML = rows.map((s, i) =>
    `<li class="${s.name === me ? 'me' : ''}"><span class="nm">${i + 1}. ${esc(s.name)}</span><span class="sc">${s.strokes}</span></li>`
  ).join('');
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

// ---- live social feed (SSE) ----
const CLIENT_ID = Math.random().toString(36).slice(2) + Date.now().toString(36);

function connectLive() {
  let es;
  try { es = new EventSource('/api/events'); }
  catch (e) { return; }                       // e.g. file:// with no backend
  es.addEventListener('holeout', ev => {
    let d; try { d = JSON.parse(ev.data); } catch { return; }
    if (!d || d.id === CLIENT_ID) return;      // ignore our own hole-outs
    const s = d.strokes === 1 ? 'stroke' : 'strokes';
    toast(`<b>${esc(d.name)}</b> finished hole ${d.hole} in ${d.strokes} ${s}`);
  });
  // EventSource auto-reconnects on error; nothing to do.
}

function broadcastHole(hole, holeStrokes) {
  fetch('/api/hole', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: CLIENT_ID, name: playerName, hole, strokes: holeStrokes }),
  }).catch(() => {});
}

let toastTimer = 0;
function toast(html) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = html;
  const box = $('toasts');
  box.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 5000);
  while (box.children.length > 4) box.removeChild(box.firstChild);   // cap stack
}

// ---- input (pointer = mouse + touch) ----
function ptr(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: (t.clientX - r.left) * (W / r.width), y: (t.clientY - r.top) * (H / r.height) };
}
function onDown(e) {
  if (!started || ball.moving || done) return;
  const p = ptr(e);
  if (Math.hypot(p.x - ball.x, p.y - ball.y) < 60) { aim = p; e.preventDefault(); }
}
function onMove(e) { if (aim) { aim = ptr(e); e.preventDefault(); } }
function onUp(e) {
  if (!aim) return;
  // shoot opposite the drag (slingshot), power by drag length
  let dx = ball.x - aim.x, dy = ball.y - aim.y;
  const d = Math.hypot(dx, dy);
  aim = null;
  if (d < 6) return;                       // ignore taps
  const power = Math.min(d, MAX_DRAG) / MAX_DRAG;
  ball.vx = (dx / d) * MAX_SPEED * power;
  ball.vy = (dy / d) * MAX_SPEED * power;
  ball.moving = true;
  strokes++; $('strokes').textContent = strokes;
}
canvas.addEventListener('mousedown', onDown);
addEventListener('mousemove', onMove);
addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// ---- physics ----
function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return { hit: dx * dx + dy * dy < r * r, nx, ny, dx, dy };
}

function step() {
  if (!ball || !ball.moving) return;
  const speed = Math.hypot(ball.vx, ball.vy);
  const sub = Math.max(1, Math.ceil(speed / (R * 0.5)));   // sub-step vs tunneling
  for (let s = 0; s < sub; s++) {
    ball.x += ball.vx / sub;
    ball.y += ball.vy / sub;
    for (const [x, y, w, h] of walls) {
      const c = circleRect(ball.x, ball.y, R, x, y, w, h);
      if (!c.hit) continue;
      let d = Math.hypot(c.dx, c.dy) || 1;
      const nxv = c.dx / d, nyv = c.dy / d;
      const dot = ball.vx * nxv + ball.vy * nyv;
      ball.vx -= 2 * dot * nxv;
      ball.vy -= 2 * dot * nyv;
      const push = R - d;
      ball.x += nxv * push; ball.y += nyv * push;
      ball.vx *= 0.8; ball.vy *= 0.8;
    }
    const dc = Math.hypot(ball.x - cup.x, ball.y - cup.y);
    if (dc < CUP_R - 2 && speed < 7) { sink(); return; }
  }
  ball.vx *= FRICTION; ball.vy *= FRICTION;
  if (Math.hypot(ball.vx, ball.vy) < STOP) { ball.vx = ball.vy = 0; ball.moving = false; }
}

function sink() {
  ball.moving = false; ball.vx = ball.vy = 0;
  ball.x = cup.x; ball.y = cup.y;
  total += strokes; $('total').textContent = total;
  if (started) broadcastHole(holeIdx + 1, strokes);   // notify other live players
  setTimeout(() => {
    if (holeIdx < HOLES.length - 1) { holeIdx++; loadHole(holeIdx); }
    else finishRound();
  }, 650);
}

// ---- render ----
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function draw() {
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--fairway').trim();
  ctx.fillRect(MARGIN, MARGIN, W - MARGIN * 2, H - MARGIN * 2);

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--wall').trim();
  for (const [x, y, w, h] of walls) roundRect(x, y, w, h, 4), ctx.fill();

  // cup + flag
  ctx.fillStyle = '#0d1f14';
  ctx.beginPath(); ctx.arc(cup.x, cup.y, CUP_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.35)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.strokeStyle = '#e5e5e5'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cup.x, cup.y); ctx.lineTo(cup.x, cup.y - 40); ctx.stroke();
  ctx.fillStyle = '#facc15';
  ctx.beginPath(); ctx.moveTo(cup.x, cup.y - 40); ctx.lineTo(cup.x + 22, cup.y - 33);
  ctx.lineTo(cup.x, cup.y - 26); ctx.closePath(); ctx.fill();

  // aim guide
  if (aim && !ball.moving) {
    let dx = ball.x - aim.x, dy = ball.y - aim.y;
    const d = Math.hypot(dx, dy) || 1;
    const power = Math.min(d, MAX_DRAG) / MAX_DRAG;
    const len = power * 130;
    ctx.strokeStyle = `rgba(250,204,21,${0.4 + power * 0.5})`;
    ctx.lineWidth = 3; ctx.setLineDash([6, 6]);
    ctx.beginPath(); ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(ball.x + (dx / d) * len, ball.y + (dy / d) * len); ctx.stroke();
    ctx.setLineDash([]);
  }

  // ball
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.beginPath(); ctx.arc(ball.x + 1, ball.y + 2, R, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--ball').trim();
  ctx.beginPath(); ctx.arc(ball.x, ball.y, R, 0, Math.PI * 2); ctx.fill();
}

function loop() { step(); if (ball) draw(); requestAnimationFrame(loop); }
loadHole(0);            // render a course behind the start overlay
connectLive();          // subscribe to other players' hole-outs
requestAnimationFrame(loop);
</script>
